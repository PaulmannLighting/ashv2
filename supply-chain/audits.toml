[[audits.log]]
who = "Richard Neumann <neumann@paulmann.de>"
criteria = "safe-to-deploy"
version = "0.4.30"
notes = "The `log` dependency has been updated from version 0.4.29 to 0.4.30. This update primarily adds support for capturing `std::net` types as structured values in the key-value logging API. The changes are straightforward, implementing `ToValue` for various `std::net` types by leveraging their `Display` implementations. The diff also includes updates to the CI workflow, documentation, and a bump in the Minimum Supported Rust Version (MSRV) to 1.71.0. No `unsafe` code has been added or modified. The changes are deemed safe."

[[audits.log]]
who = "Richard Neumann <neumann@paulmann.de>"
criteria = "safe-to-deploy"
delta = "0.4.30 -> 0.4.32"
notes = "AI-assisted review: delta 0.4.30 -> 0.4.32. Updates are focused on KV key handling (Key static/borrowed support), macro parsing improvements, feature gating adjustments, changelog/docs/tests. Unsafe-sensitive logger globals remain unchanged; no new privileged behavior introduced."

[[audits.log]]
who = "Richard Neumann <neumann@paulmann.de>"
criteria = "safe-to-deploy"
delta = "0.4.32 -> 0.4.33"
notes = "AI-assisted review: delta 0.4.32 -> 0.4.33. Changes are narrowly scoped to key equality semantics in structured logging (MaybeStaticStr Eq/Ord/Hash consistency), plus tests/changelog/version bumps. No new unsafe code paths or ambient-capability changes."

