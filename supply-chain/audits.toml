[[audits.ashv2]]
who = "Richard Neumann <neumann@paulmann.de>"
criteria = "safe-to-deploy"
delta = "6.0.2 -> 8.1.0"
notes = "AI-assisted review: delta 6.0.2 -> 8.1.0. Major internal refactor (new Seq type replacing WrappingU3, module reorganization, API simplification in proxy/open paths, task shutdown ordering changes). Crate enforces deny(unsafe_code); removed previous utility containing NonZero::new_unchecked. No newly introduced ambient-capability surfaces beyond existing serial I/O."

[[audits.ashv2]]
who = "Richard Neumann <neumann@paulmann.de>"
criteria = "safe-to-deploy"
delta = "8.1.0 -> 8.1.1"
notes = "AI-assisted review: delta 8.1.0 -> 8.1.1. Workspace diff is limited to the crate version bump, package exclude metadata, lockfile updates, and removal of the unpublished audited_as entry. No ashv2 source code changed; the unescaper dependency update is audited separately."

[[audits.ashv2]]
who = "Richard Neumann <neumann@paulmann.de>"
criteria = "safe-to-deploy"
delta = "8.1.1 -> 9.0.1"
notes = "AI-assisted review: delta 8.1.1 -> 9.0.1. This release removes the public Actor constructor in favor of exported start(), moves serial I/O to the external async-serialport worker-future split, adapts task shutdown to a custom termination error, and rewrites the receiver buffering path to use ReaderStream chunks directly while preserving bytes after frame boundaries and shrinking the frame buffer before reads. Crate still denies unsafe code; no new ambient capability beyond the existing serial I/O path. Dependency updates to async-serialport 0.2.0 and bytes 1.12.1 are audited separately."

[[audits.ashv2]]
who = "Richard Neumann <neumann@paulmann.de>"
criteria = "safe-to-deploy"
delta = "9.0.1 -> 10.0.0"
notes = "AI-assisted review: delta 9.0.1 -> 10.0.0. This release updates to async-serialport 0.3.0, removes internal Tokio spawning from the public start path, and makes start return a Handle plus a named Futures container containing the serial Worker and opaque transmitter/receiver futures for caller-owned spawning. It removes the old Tasks/Shutdown/custom termination error API, moves termination signaling to Handle::terminate, has the transmitter clear the receiver running flag on exit, keeps full transmission-window requests requeued without delay, and confines Tokio rt usage to dev tests. The crate still denies unsafe code; no new ambient capability beyond the existing serial I/O path. async-serialport 0.3.0 is audited separately."

[[audits.ashv2]]
who = "Richard Neumann <neumann@paulmann.de>"
criteria = "safe-to-deploy"
delta = "10.0.0 -> 10.0.2"
notes = "AI-assisted review: delta 10.0.0 -> 10.0.2. Changes are limited to the crate version bump and transmitter behavior before connection establishment: non-RST-ACK messages are requeued immediately and the reset path is driven instead of rejecting them with NotConnected. No dependency changes, unsafe code, build script changes, filesystem/network/process behavior, or new ambient capabilities were introduced."

[[audits.ashv2]]
who = "OpenAI Codex (AI-assisted)"
criteria = "safe-to-deploy"
delta = "10.0.2 -> 11.0.0"
notes = "AI-assisted review: delta 10.0.2 -> 11.0.0 removes serialport and async-serialport integration in favor of caller-provided AsyncRead and AsyncWrite transports, replaces the private three-bit Seq type with masked u8 sequence and acknowledgement values, removes handle-driven termination in favor of caller-owned future cancellation, and adds optional EZSP Transmit/Receive adapters. Reviewed frame-header masking, wraparound, actor I/O bounds and lifecycle, EZSP encoding/decoding, and feature gating. The crate denies unsafe code; transport ownership moves to the caller and no filesystem, network, process, or build-script capability is introduced. Dependency changes are audited separately."

[[audits.async-serialport]]
who = "Richard Neumann <neumann@paulmann.de>"
criteria = "safe-to-deploy"
version = "0.1.0"
notes = "AI-assisted review: audited async-serialport 0.1.0 full source from the local Cargo registry. Small Tokio adapter for serialport with no unsafe code and no build script. Runtime behavior is limited to spawning a worker task that owns the blocking serial port and services read, write, and flush requests over Tokio channels; no filesystem, network, process, or unrelated ambient capabilities."

[[audits.async-serialport]]
who = "Richard Neumann <neumann@paulmann.de>"
criteria = "safe-to-deploy"
delta = "0.1.0 -> 0.2.0"
notes = "AI-assisted review: delta 0.1.0 -> 0.2.0. The crate becomes runtime-agnostic by returning a WorkerFuture from split instead of calling tokio::spawn, and narrows Tokio library features to sync/io-util with runtime only in dev-deps. Reader/writer/worker protocol remains the same; no unsafe code, build script, filesystem/network/process behavior, or new ambient capabilities."

[[audits.async-serialport]]
who = "Richard Neumann <neumann@paulmann.de>"
criteria = "safe-to-deploy"
delta = "0.2.0 -> 0.3.0"
notes = "AI-assisted review: delta 0.2.0 -> 0.3.0. The crate replaces the boxed WorkerFuture alias with a public concrete Worker<T> future that owns the serial port and command receiver, implements Future by polling the existing mpsc receiver directly, and returns the serial port when senders close. Reader/writer message handling remains equivalent; no unsafe code, build script, filesystem/network/process behavior, or new ambient capabilities were introduced."

